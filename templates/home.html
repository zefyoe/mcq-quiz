<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>MCQ Quiz</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  </head>
  <body>
    <div style="background:#1e3a8a; color:white; padding:12px 20px;">
  <strong>Dr. Youssef – MCQ Platform</strong>
</div>
    <div class="container">
      <div class="card">
        <h1>Medical MCQ Examination</h1>
<p class="small">Selecteer een categorie en start de test.</p>
        <p>Kies een categorie en start de quiz.</p>

        {% if error %}
          <p class="bad">{{ error }}</p>
        {% endif %}

        <form method="post">
          <p class="small">Categorie</p>
          <select name="category" required>
            {% for c in categories %}
              <option value="{{ c }}">{{ c }}</option>
            {% endfor %}
          </select>

          <div class="actions">
            <button class="primary" type="submit">Start</button>
          </div>
        </form>

        <hr>
        <p class="small">Tip: de gratis server kan soms “slapen”; de eerste keer laden duurt dan wat langer.</p>
      </div>
    </div>
  </body>
</html>
