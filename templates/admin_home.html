<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Admin</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='admin_new_question.css') }}">
  </head>
  <body>
    <header class="admin-topbar">
      <div class="admin-topbar-inner">
        <div class="admin-brand">Rady</div>
        <div class="admin-topbar-actions">
          <div class="admin-topbar-badge">Admin</div>
          {% if current_user.is_authenticated and current_user.is_admin %}
            <div class="admin-topbar-badge admin-role-badge">ADMIN ROLE</div>
          {% endif %}
          <a class="admin-link-button admin-topbar-link" href="{{ url_for('home') }}">Home</a>
          <a class="admin-link-button admin-topbar-link" href="{{ url_for('logout') }}">Log out</a>
        </div>
      </div>
    </header>
    <main class="admin-container">
      <h1>Admin</h1>
      <p>{{ question_count }} question(s) currently stored in the database.</p>

      <div class="admin-actions">
        <a class="admin-link-button" href="{{ url_for('admin_new_question') }}">Add one question</a>
        <a class="admin-link-button" href="{{ url_for('admin_import_images') }}">Bulk import images</a>
        <a class="admin-link-button" href="{{ url_for('admin_database') }}">Database</a>
      </div>
    </main>
  </body>
</html>
