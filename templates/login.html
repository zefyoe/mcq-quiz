<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login • Bymed</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='login.css') }}">
</head>
<body>
  <div class="login-page">
    <div class="login-shell">

      <section class="login-hero">
        <div class="login-hero-overlay"></div>
        <div class="login-hero-content">
          <p class="eyebrow">Anatomy / FMH1 QBank</p>
          <h1>Rady</h1>
          <p class="hero-text">
            Welcome to your private medical question bank.
          </p>
        </div>
      </section>

      <section class="login-panel">
        <div class="login-card">
          <div class="login-header">
            <h2>Sign in</h2>
            <p>Use your account to continue.</p>
          </div>

          {% if error %}
          <div class="login-error">{{ error }}</div>
          {% endif %}

          <form method="post" class="login-form">
            <input type="hidden" name="next" value="{{ next }}">

            <label for="email">Email</label>
            <input id="email" name="email" type="email" placeholder="admin@example.com" required>

            <label for="password">Password</label>
            <div class="password-wrap">
              <input id="password" name="password" type="password" placeholder="Password" required>
              <button type="button" class="toggle-password" onclick="togglePassword()">Show</button>
            </div>

            <button type="submit" class="login-button">Login</button>
          </form>

          <!-- 🔥 NEW: REGISTER BUTTON -->
          <p style="margin-top:18px; text-align:center; font-size:14px;">
            Don't have an account?
            <a href="{{ url_for('register') }}" style="font-weight:600;">Create account</a>
          </p>

        </div>
      </section>

    </div>
  </div>

  <script>
    function togglePassword() {
      const input = document.getElementById("password");
      const btn = document.querySelector(".toggle-password");
      if (input.type === "password") {
        input.type = "text";
        btn.textContent = "Hide";
      } else {
        input.type = "password";
        btn.textContent = "Show";
      }
    }
  </script>
</body>
</html>
