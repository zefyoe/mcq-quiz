<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login • bymed</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='login.css') }}">
</head>
<body>
  <div class="login-page">
    <div class="login-shell">

      <section class="login-hero">
        <div class="login-hero-overlay"></div>
        <div class="login-hero-content">
          <p class="eyebrow">Anatomy QBank</p>
          <h1>Welkom terug</h1>
          <p class="hero-text">
            Log in om toegang te krijgen tot je private vraagbank.
          </p>
        </div>
      </section>

      <section class="login-panel">
        <div class="login-card">
          <div class="login-header">
            <h2>Sign in</h2>
            <p>Gebruik je admin account om verder te gaan.</p>
          </div>

          {% if error %}
          <div class="login-error">{{ error }}</div>
          {% endif %}

          <form method="post" class="login-form">
            <input type="hidden" name="next" value="{{ next }}">

            <label for="email">Email</label>
            <input id="email" name="email" type="email" placeholder="admin@example.com" required>

            <label for="password">Wachtwoord</label>
            <div class="password-wrap">
              <input id="password" name="password" type="password" placeholder="Wachtwoord" required>
              <button type="button" class="toggle-password" onclick="togglePassword()">Toon</button>
            </div>

            <button type="submit" class="login-button">Login</button>
          </form>
        </div>
      </section>

    </div>
  </div>

  <script>
    function togglePassword() {
      const input = document.getElementById("password");
      const btn = document.querySelector(".toggle-password");
      if (input.type === "password") {
        input.type = "text";
        btn.textContent = "Verberg";
      } else {
        input.type = "password";
        btn.textContent = "Toon";
      }
    }
  </script>
</body>
</html>
