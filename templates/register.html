<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Register • bymed</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='login.css') }}">
</head>
<body>
  <div class="login-page">
    <div class="login-shell">

      <section class="login-hero">
        <div class="login-hero-overlay"></div>
        <div class="login-hero-content">
          <p class="eyebrow">Anatomy QBank</p>
          <h1>Create account</h1>
          <p class="hero-text">
            Register with your email address to access the platform.
          </p>
        </div>
      </section>

      <section class="login-panel">
        <div class="login-card">
          <div class="login-header">
            <h2>Register</h2>
            <p>Create your account to continue.</p>
          </div>

          {% if error %}
          <div class="login-error">{{ error }}</div>
          {% endif %}

          <form method="post" class="login-form">
            <label for="email">Email</label>
            <input id="email" name="email" type="email" placeholder="student@example.com" required>

            <label for="password">Password</label>
            <input id="password" name="password" type="password" placeholder="At least 8 characters" required>

            <label for="confirm_password">Confirm password</label>
            <input id="confirm_password" name="confirm_password" type="password" placeholder="Repeat password" required>

            <button type="submit" class="login-button">Create account</button>
          </form>

          <p style="margin-top:16px; text-align:center;">
            Already have an account?
            <a href="{{ url_for('login') }}">Sign in</a>
          </p>
        </div>
      </section>

    </div>
  </div>
</body>
</html>
